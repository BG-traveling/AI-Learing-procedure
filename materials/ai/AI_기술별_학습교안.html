<header><div><div class="tag">초보자용 종합 교안</div><h1>AI 교육과정 기술별 다시 배우기</h1><p class="lead">문제를 맞히기 전에 기술이 왜 필요한지부터 이해합니다. 각 단원을 순서대로 읽고 코드를 직접 실행한 뒤, 실습과 이해 점검을 완료하세요.</p></div></header>

<script>
const lessons=[
{t:"Python 기초",why:"AI 코드의 문법과 실행 흐름을 담당하는 출발점입니다.",goal:"자료형을 구분하고 조건문·반복문·함수로 문제 해결 절차를 표현한다.",concepts:[["자료형","int·float·str·bool은 한 값, list·tuple·dict·set은 여러 값을 담습니다. list는 수정 가능하고 tuple은 생성 후 항목을 바꿀 수 없습니다."],["함수","입력을 매개변수로 받고 처리 결과를 return합니다. 긴 코드를 작은 함수로 나누면 테스트와 재사용이 쉬워집니다."],["예외처리","try/except는 예상 가능한 오류를 안전하게 처리합니다. 오류를 무조건 숨기지 말고 구체적인 예외만 잡아야 합니다."]],code:"def average(values):\n    if not values:\n        return 0\n    return sum(values) / len(values)\n\ntry:\n    print(average([80, 90, 70]))\nexcept TypeError as e:\n    print('숫자 목록을 넣어주세요:', e)",mistake:"print는 화면 출력이고 return은 호출한 곳에 값을 돌려줍니다. 둘을 같은 기능으로 혼동하지 마세요.",practice:"점수 목록을 받아 60점 이상만 반환하는 함수를 작성하고, 빈 목록도 처리하세요."},
{t:"NumPy",why:"수치 데이터와 이미지를 빠르게 계산하는 배열 엔진입니다.",goal:"ndarray의 shape·dtype·축(axis)을 이해하고 벡터화 연산을 사용한다.",concepts:[["ndarray","같은 자료형의 값이 연속적으로 저장된 다차원 배열입니다. Python 반복문보다 벡터 연산이 빠릅니다."],["shape와 axis","표 데이터는 보통 (행,열), 컬러 이미지는 (높이,너비,채널)입니다. axis=0은 행을 따라 내려가며 열별 계산을 합니다."],["브로드캐스팅","모양이 다른 배열도 호환 규칙을 만족하면 작은 배열을 확장해 연산합니다."]],code:"import numpy as np\nx=np.array([[1,2,3],[4,5,6]])\nprint(x.shape, x.dtype)\nprint(x.mean(axis=0))\nprint(x * np.array([10,100,1000]))",mistake:"reshape 전후 전체 원소 수는 같아야 합니다. 이미지의 width와 height 순서도 함수마다 확인하세요.",practice:"0~11 배열을 3×4로 바꾸고 행별 평균과 열별 평균을 각각 구하세요."},
{t:"Pandas",why:"CSV·Excel·DB의 표 데이터를 탐색하고 정제합니다.",goal:"DataFrame을 읽고 선택·결측치 처리·groupby·merge를 수행한다.",concepts:[["DataFrame","행과 열로 구성된 표입니다. head, info, describe로 구조·자료형·분포를 먼저 확인합니다."],["선택","loc은 이름, iloc은 정수 위치를 사용합니다. 조건 필터는 각 행에 대해 True/False인 불리언 마스크를 만듭니다."],["집계와 결합","groupby는 나누기→적용→합치기이며, merge는 공통 키로 두 표를 연결합니다."]],code:"import pandas as pd\ndf=pd.DataFrame({'team':['A','A','B'],'score':[80,None,90]})\ndf['score']=df['score'].fillna(df['score'].median())\nprint(df.groupby('team')['score'].agg(['mean','count']))",mistake:"결측치를 무조건 평균으로 채우지 마세요. 분포와 업무 의미에 따라 중앙값·최빈값·삭제 등을 선택합니다.",practice:"CSV를 읽고 컬럼별 결측률, 중복 행 수, 그룹별 평균을 출력하세요."},
{t:"시각화·EDA",why:"모델링 전에 데이터 분포와 오류를 눈으로 발견합니다.",goal:"질문에 맞는 그래프를 선택하고 축·단위·표본 수를 함께 해석한다.",concepts:[["분포","히스토그램은 값의 분포, boxplot은 중앙값·사분위수·이상치 후보를 보여줍니다."],["관계","산점도는 두 수치 변수의 관계를 보여주지만 상관관계가 인과관계를 증명하지는 않습니다."],["범주 비교","막대그래프는 범주별 크기를 비교합니다. 평균만 보지 말고 표본 수와 변동성도 확인합니다."]],code:"import seaborn as sns\nimport matplotlib.pyplot as plt\nsns.histplot(data=df,x='score',hue='team',kde=True)\nplt.title('팀별 점수 분포'); plt.show()",mistake:"축을 잘라 차이를 과장하거나 서로 다른 단위를 한 그래프에서 직접 비교하지 마세요.",practice:"숫자형 변수의 분포·이상치·상관관계를 확인하는 그래프 3개를 만들고 관찰 결과를 적으세요."},
{t:"데이터 전처리",why:"원본 데이터를 모델이 학습 가능한 일관된 숫자로 바꿉니다.",goal:"분할 후 결측치·인코딩·스케일링을 Pipeline 안에서 처리한다.",concepts:[["데이터 누수","테스트 정보가 전처리나 학습에 섞이면 성능이 부풀려집니다. 먼저 분할하고 train에 fit, test에는 transform만 합니다."],["인코딩","순서 없는 범주는 OneHotEncoder, 실제 순서가 있는 범주는 OrdinalEncoder가 적합합니다."],["스케일링","StandardScaler는 평균 0·표준편차 1로 맞춥니다. 거리 기반 모델과 규제 모델에 특히 중요합니다."]],code:"from sklearn.pipeline import make_pipeline\nfrom sklearn.impute import SimpleImputer\nfrom sklearn.preprocessing import StandardScaler\npipe=make_pipeline(SimpleImputer(strategy='median'),StandardScaler(),model)",mistake:"전체 데이터에 scaler.fit_transform을 한 뒤 나누면 테스트 분포가 학습에 누출됩니다.",practice:"결측치 처리→스케일링→로지스틱 회귀 Pipeline을 만들고 교차검증하세요."},
{t:"머신러닝",why:"데이터의 패턴을 학습해 새로운 입력의 값이나 범주를 예측합니다.",goal:"분류·회귀·군집화를 구분하고 올바른 평가 지표를 선택한다.",concepts:[["분류와 회귀","범주를 예측하면 분류, 연속 숫자를 예측하면 회귀입니다."],["일반화","훈련 성능이 아니라 보지 못한 데이터의 성능이 목표입니다. 교차검증 평균과 변동성을 함께 봅니다."],["평가","불균형 분류는 precision·recall·F1, 회귀는 MAE·RMSE·R²를 문제 비용에 맞춰 봅니다."]],code:"from sklearn.model_selection import cross_validate\nscores=cross_validate(pipe,X,y,cv=5,scoring=['accuracy','f1_macro'])\nprint(scores['test_f1_macro'].mean())",mistake:"accuracy 하나만으로 모델을 선택하지 마세요. 어떤 오류가 더 위험한지 먼저 정해야 합니다.",practice:"DummyClassifier, LogisticRegression, RandomForest를 같은 분할과 지표로 비교하세요."},
{t:"딥러닝",why:"여러 층의 신경망이 복잡한 표현을 데이터에서 직접 학습합니다.",goal:"입출력 shape·활성화 함수·손실함수·과적합 신호를 설명한다.",concepts:[["순전파와 역전파","순전파로 예측과 손실을 계산하고, 역전파로 각 가중치의 기울기를 구해 optimizer가 갱신합니다."],["출력층","이진 분류는 1개+sigmoid, 다중 분류는 클래스 수+softmax를 주로 사용합니다."],["과적합","훈련 손실은 감소하지만 검증 손실이 증가하면 EarlyStopping·Dropout·데이터 증강을 검토합니다."]],code:"model.compile(optimizer='adam',loss='binary_crossentropy',metrics=['accuracy'])\nmodel.fit(X_train,y_train,validation_split=.2,epochs=30,callbacks=[early_stop])",mistake:"검증 데이터를 학습 데이터처럼 반복 조정하면 검증 세트에도 과적합됩니다.",practice:"훈련/검증 손실 곡선을 그리고 가장 적절한 epoch를 설명하세요."},
{t:"SQL·MariaDB",why:"많은 데이터를 안전하게 저장하고 필요한 부분만 정확히 조회합니다.",goal:"SELECT·WHERE·GROUP BY·JOIN과 기본 키의 역할을 이해한다.",concepts:[["조회 순서","FROM→WHERE→GROUP BY→HAVING→SELECT→ORDER BY 순서로 논리적으로 처리됩니다."],["JOIN","PK와 FK 같은 연결 키로 표를 합칩니다. 일대다 관계에서는 행 수가 늘 수 있습니다."],["트랜잭션","여러 변경을 하나의 작업으로 묶어 모두 성공하거나 모두 취소되게 합니다."]],code:"SELECT c.name, COUNT(o.id) order_count\nFROM customers c LEFT JOIN orders o ON c.id=o.customer_id\nGROUP BY c.id,c.name\nHAVING COUNT(o.id)>=2;",mistake:"JOIN 키가 유일하지 않으면 예상보다 행이 폭증합니다. 결합 전후 행 수를 확인하세요.",practice:"고객별 주문 수와 총액을 구하되 주문이 없는 고객도 표시하세요."},
{t:"FastAPI",why:"학습한 모델을 다른 프로그램이 호출할 수 있는 HTTP API로 제공합니다.",goal:"요청 검증·상태 코드·비동기·CORS와 모델 로딩 흐름을 이해한다.",concepts:[["Endpoint","HTTP 메서드와 경로의 조합입니다. GET은 조회, POST는 요청 본문을 포함한 처리에 주로 씁니다."],["Pydantic","입력 자료형과 제약조건을 검증해 잘못된 요청을 명확히 거절합니다."],["서비스화","모델은 서버 시작 시 한 번 로드하고 요청마다 동일한 전처리 Pipeline으로 예측합니다."]],code:"class Request(BaseModel):\n    age:int=Field(ge=0,le=120)\n@app.post('/predict')\ndef predict(x:Request):\n    pred=model.predict([[x.age]])[0]\n    return {'prediction':int(pred)}",mistake:"API 키와 DB 비밀번호를 코드에 쓰지 말고 환경변수로 관리하세요.",practice:"GET /health와 입력 검증이 포함된 POST /predict를 만들고 오류 요청도 시험하세요."},
{t:"React·TypeScript",why:"사용자가 데이터를 입력하고 AI 결과를 이해할 수 있는 화면을 만듭니다.",goal:"컴포넌트·props·state·비동기 요청·타입을 구분한다.",concepts:[["컴포넌트","UI를 독립적인 함수 단위로 나눕니다. props는 부모가 전달하고 state는 컴포넌트가 기억합니다."],["상태","state를 직접 변경하지 말고 setter를 사용합니다. 상태 변경은 다시 렌더링을 유발합니다."],["API 호출","loading·success·error 상태를 모두 설계해야 사용자가 현재 상황을 이해합니다."]],code:"const [result,setResult]=useState<number|null>(null)\nconst run=async()=>{\n const r=await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(input)})\n if(!r.ok) throw new Error('예측 실패')\n setResult((await r.json()).prediction)\n}",mistake:"렌더링 중 setState를 호출하면 무한 렌더링이 생길 수 있습니다.",practice:"입력 폼에 로딩 표시, 오류 메시지, 결과 초기화 버튼을 추가하세요."},
{t:"OpenCV",why:"이미지를 숫자 배열로 처리해 색상·경계·도형·움직임을 찾습니다.",goal:"BGR·HSV·마스크·필터·에지·윤곽선의 처리 순서를 설명한다.",concepts:[["색공간","OpenCV 입력은 BGR입니다. HSV는 색상·채도·밝기를 분리해 색상 범위 추출에 편리합니다."],["마스크","inRange 결과는 조건에 맞으면 255, 아니면 0인 단일 채널 배열입니다."],["전처리","노이즈 제거→색/밝기 변환→이진화/에지→모폴로지→윤곽선 순으로 목적에 맞게 조합합니다."]],code:"img=cv2.imread('sample.jpg')\nhsv=cv2.cvtColor(img,cv2.COLOR_BGR2HSV)\nmask=cv2.inRange(hsv,lower,upper)\nmask=cv2.morphologyEx(mask,cv2.MORPH_OPEN,kernel)\nresult=cv2.bitwise_and(img,img,mask=mask)",mistake:"imread가 None이면 처리보다 먼저 경로와 파일명을 확인하세요.",practice:"특정 색을 추출하고 조명 변화에 따라 H/S/V 범위를 조정한 기록을 남기세요."},
{t:"LLM·프롬프트",why:"자연어 입력을 바탕으로 텍스트·코드·구조화 데이터를 생성합니다.",goal:"토큰·컨텍스트·프롬프트 구조·환각과 검증 방법을 이해한다.",concepts:[["토큰","모델이 처리하는 텍스트 단위이며 입력+출력 토큰은 비용과 지연에 영향을 줍니다."],["프롬프트","역할·목표·근거·제약·출력 형식·예시를 명확히 분리합니다."],["환각","그럴듯한 답도 사실이 아닐 수 있습니다. 출처, 구조화 검증, 도구 결과와 평가셋으로 확인합니다."]],code:"prompt='''역할: 초보자 선생님\n근거: {context}\n질문: {question}\n제약: 근거에 없으면 모른다고 답하기\n출력: 결론, 근거, 주의점'''",mistake:"프롬프트에 개인정보·비밀번호·API 키를 넣지 마세요.",practice:"같은 질문에 나쁜 프롬프트와 구조화된 프롬프트를 적용해 결과를 비교하세요."},
{t:"임베딩·RAG",why:"LLM이 학습하지 않은 사내 문서나 최신 자료를 검색해 근거로 사용합니다.",goal:"청크·임베딩·벡터검색·재순위화·근거성 평가 흐름을 설명한다.",concepts:[["임베딩","문장의 의미를 숫자 벡터로 표현해 의미가 가까운 문서를 찾습니다."],["RAG 흐름","문서 수집→정제→청크→임베딩→저장→검색→프롬프트 구성→답변 순서입니다."],["평가","검색이 정답 근거를 찾았는지와 답변이 근거에 충실한지를 분리해 평가합니다."]],code:"docs=store.similarity_search(question,k=5)\ncontext='\\n'.join(d.page_content for d in docs)\nanswer=llm.invoke(f'다음 근거만 사용하세요:\\n{context}\\n질문:{question}')",mistake:"청크를 너무 작게 자르면 문맥이 사라지고 너무 크게 자르면 검색 정확도와 비용이 나빠집니다.",practice:"문서 5개로 작은 RAG를 만들고 답변마다 파일명과 문단 번호를 표시하세요."},

const key="ai-tech-textbook-progress-v1";let done=JSON.parse(localStorage.getItem(key)||"{}"),index=0;
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function renderNav(){nav.innerHTML=lessons.map((x,i)=>`<button class="nav ${i===index?'active':''}" onclick="show(${i})">${i+1}. ${x.t}</button>`).join("")}
function show(i){index=i;const x=lessons[i];content.innerHTML=`<article class="card"><span class="tag">${i+1} / ${lessons.length}</span><h2>${x.t}</h2><p>${x.why}</p><div class="goal"><b>학습목표</b><br>${x.goal}</div><h3>핵심 개념</h3><div class="grid">${x.concepts.map(c=>`<div class="box"><h3>${c[0]}</h3><p>${c[1]}</p></div>`).join("")}</div><h3>따라 해보기</h3><pre><code>${esc(x.code)}</code></pre><div class="mistake"><b>⚠ 흔한 실수</b><br>${x.mistake}</div><div class="practice" style="margin-top:12px"><b>✍ 직접 실습</b><br>${x.practice}</div><h3>이해 점검</h3><label class="check"><input type="checkbox" ${done[i]?"checked":""} onchange="complete(${i},this.checked)">이 기술을 내 말로 설명하고 실습까지 완료했습니다.</label><div class="pager"><button class="move" onclick="show(Math.max(0,${i-1}))">← 이전</button><button class="move" onclick="show(Math.min(lessons.length-1,${i+1}))">다음 →</button></div></article>`;renderNav();scrollTo(0,0)}
function complete(i,v){done[i]=v;localStorage.setItem(key,JSON.stringify(done));progress()}
function progress(){const n=Object.values(done).filter(Boolean).length;bar.style.width=(n/lessons.length*100)+"%";progressText.textContent=`${n} / ${lessons.length} 완료`}
renderNav();show(0);progress();
</script>
</body></html>
